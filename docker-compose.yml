version: '3.8'

services:
  rent-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rent-tracker
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/renttracker.db
    restart: unless-stopped
