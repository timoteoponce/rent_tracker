<!--
  RentTracker Offline Page
  ========================
  Purpose: Shown when the user has no internet connection and tries
  to navigate to a page that is not cached.
  
  This page is cached by the service worker (sw.js) on install and
  served as a fallback when network requests fail during navigation.
  
  Design: Self-contained styles (no external CSS dependency) so it
  renders correctly even if site.css is not cached.
  
  Added in branch: tasks/add-pwa-support
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - RentTracker</title>
    <meta name="theme-color" content="#2563eb" />
    <style>
        /* Minimal offline page styles to avoid external dependency */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f9fafb;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        .offline-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .offline-icon svg {
            width: 40px;
            height: 40px;
            color: #2563eb;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }
        p {
            color: #6b7280;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .brand {
            margin-top: 2rem;
            font-weight: 600;
            color: #2563eb;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
        </div>
        <h1>You are offline</h1>
        <p>It looks like you have lost your internet connection. RentTracker requires a connection to load live data, but cached pages may still be available.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
    <div class="brand">RentTracker</div>
</body>
</html>
