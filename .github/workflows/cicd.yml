name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: renttracker

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Save image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: false

      - name: Add host
        run: mkdir -p ~/.ssh && ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          gunzip -c ${{ env.IMAGE_NAME }}.tar.gz > /tmp/image.tar
          scp /tmp/image.tar ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} /bin/bash << 'SCRIPT'
            set -e
            mkdir -p ~/rent-tracker
            if [ -f ~/rent-tracker/renttracker.db ]; then
              cp ~/rent-tracker/renttracker.db ~/rent-tracker/backup-$(date +%s).db
              ls -t ~/rent-tracker/backup-*.db 2>/dev/null | tail -n +4 | xargs rm -f 2>/dev/null || true
            fi
            docker load < /tmp/image.tar
            docker stop renttracker 2>/dev/null || true
            docker rm renttracker 2>/dev/null || true
            docker run -d --name renttracker --restart unless-stopped -p 127.0.0.1:9919:8080 -v ~/rent-tracker:/app/data -e ASPNETCORE_ENVIRONMENT=Production -e ConnectionStrings__DefaultConnection="Data Source=/app/data/renttracker.db;Foreign Keys=True;" -e ASPNETCORE_URLS=http://+:8080 renttracker:latest
            echo "✓ Deployed"
          SCRIPT
