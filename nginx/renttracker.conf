# RentTracker Nginx Reverse Proxy Configuration
# 
# This configuration proxies requests from port 80/443 to the RentTracker
# application running on localhost:9919
#
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/renttracker
#   2. Update server_name to your domain
#   3. Enable: sudo ln -s /etc/nginx/sites-available/renttracker /etc/nginx/sites-enabled/
#   4. Test config: sudo nginx -t
#   5. Reload nginx: sudo systemctl reload nginx

server {
    listen 80;
    server_name renttracker.yourdomain.com;  # CHANGE THIS TO YOUR DOMAIN

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/renttracker-access.log;
    error_log /var/log/nginx/renttracker-error.log;

    location / {
        proxy_pass http://127.0.0.1:9919;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        proxy_cache_bypass $http_upgrade;
    }

    # Static file caching (optional - if serving static files through nginx)
    # location /static/ {
    #     alias /var/www/renttracker/static/;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }
}

